AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions OIDC provider and IAM role for Terraform deployments

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub organization or username
  GitHubRepo:
    Type: String
    Description: GitHub repository name
  StateBucketName:
    Type: String
    Description: Name of the Terraform state S3 bucket
  WebsiteBucketName:
    Type: String
    Description: Name of the static website S3 bucket

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: github-actions-terraform-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOIDCProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: TerraformStateAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: StateBucketAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub "arn:aws:s3:::${StateBucketName}"
                  - !Sub "arn:aws:s3:::${StateBucketName}/*"

        - PolicyName: WebsiteBucketAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WebsiteBucketFullAccess
                Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - !Sub "arn:aws:s3:::${WebsiteBucketName}"
                  - !Sub "arn:aws:s3:::${WebsiteBucketName}/*"

        - PolicyName: CloudFrontAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudFrontManage
                Effect: Allow
                Action:
                  - cloudfront:*
                Resource: "*"

        - PolicyName: IAMAndSupportingServices
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: IAMReadOnly
                Effect: Allow
                Action:
                  - iam:GetRole
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                Resource: "*"
              - Sid: S3BucketCreation
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:GetBucketPolicy
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:GetBucketAcl
                  - s3:PutBucketAcl
                  - s3:GetBucketCORS
                  - s3:PutBucketCORS
                  - s3:GetBucketWebsite
                  - s3:PutBucketWebsite
                  - s3:DeleteBucketWebsite
                  - s3:GetBucketVersioning
                  - s3:PutBucketVersioning
                  - s3:GetBucketPublicAccessBlock
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetEncryptionConfiguration
                  - s3:PutEncryptionConfiguration
                  - s3:GetBucketTagging
                  - s3:PutBucketTagging
                  - s3:GetBucketOwnershipControls
                  - s3:PutBucketOwnershipControls
                Resource: "*"

Outputs:
  OIDCProviderArn:
    Description: ARN of the GitHub OIDC provider
    Value: !GetAtt GitHubOIDCProvider.Arn
  RoleArn:
    Description: ARN of the IAM role for GitHub Actions (add this as AWS_ROLE_ARN secret)
    Value: !GetAtt GitHubActionsRole.Arn
