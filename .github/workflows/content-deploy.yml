name: Content Deploy

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: ap-south-1

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Sync Content & Invalidate Cache
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set environment
        id: env
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          echo "env=$ENV" >> "$GITHUB_OUTPUT"

      - name: Read bucket and distribution config
        id: config
        run: |
          # Read bucket name from tfvars
          BUCKET=$(grep 'bucket_name' env/${{ steps.env.outputs.env }}.tfvars | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"

          # Get CloudFront distribution ID from Terraform state
          cd cloudfront
          terraform init -backend-config=backend/${{ steps.env.outputs.env }}.conf > /dev/null 2>&1
          DIST_ID=$(terraform output -raw cloudfront_distribution_id)
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Sync content to S3
        run: |
          aws s3 sync content/${{ steps.env.outputs.env }}/ \
            s3://${{ steps.config.outputs.bucket }}/ \
            --delete \
            --cache-control "max-age=86400"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.config.outputs.distribution_id }} \
            --paths '/*'

      - name: Verify deployment
        run: |
          echo "Content synced to s3://${{ steps.config.outputs.bucket }}/"
          echo "CloudFront invalidation created for ${{ steps.config.outputs.distribution_id }}"
